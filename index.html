<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Moon Trader</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-chart-financial@0.2.1/dist/chartjs-chart-financial.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap');

:root {
  --bg:     #080b14;
  --bg2:    #0d1220;
  --bg3:    #111827;
  --accent: #4f8fff;
  --acc2:   #7c3aed;
  --green:  #10d98a;
  --red:    #ff4560;
  --yellow: #fbbf24;
  --text:   #e2e8f0;
  --muted:  #64748b;
  --border: rgba(79,143,255,0.15);
  --glow:   0 0 20px rgba(79,143,255,0.3);
  --glow-g: 0 0 20px rgba(16,217,138,0.3);
}

*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}

body {
  background:var(--bg);
  color:var(--text);
  font-family:'Space Grotesk',sans-serif;
  min-height:100vh;
  overflow-x:hidden;
}

/* Stars */
body::before {
  content:'';
  position:fixed;
  inset:0;
  background-image:
    radial-gradient(1px 1px at 20% 30%,rgba(255,255,255,.4) 0%,transparent 100%),
    radial-gradient(1px 1px at 80% 10%,rgba(255,255,255,.3) 0%,transparent 100%),
    radial-gradient(1px 1px at 50% 60%,rgba(255,255,255,.2) 0%,transparent 100%),
    radial-gradient(1px 1px at 10% 80%,rgba(255,255,255,.3) 0%,transparent 100%),
    radial-gradient(1px 1px at 90% 70%,rgba(255,255,255,.2) 0%,transparent 100%),
    radial-gradient(1px 1px at 35% 15%,rgba(255,255,255,.4) 0%,transparent 100%),
    radial-gradient(2px 2px at 75% 40%,rgba(79,143,255,.4) 0%,transparent 100%),
    radial-gradient(2px 2px at 25% 55%,rgba(124,58,237,.3) 0%,transparent 100%);
  pointer-events:none;
  z-index:0;
}

.app{position:relative;z-index:1;padding-bottom:80px}

/* Header */
.header {
  background:linear-gradient(180deg,rgba(13,18,32,.98) 0%,rgba(8,11,20,.95) 100%);
  border-bottom:1px solid var(--border);
  padding:14px 20px 12px;
  position:sticky;
  top:0;
  z-index:100;
  backdrop-filter:blur(20px);
}

.header-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px}

.logo{display:flex;align-items:center;gap:10px}

.logo-icon {
  width:34px;height:34px;
  background:linear-gradient(135deg,var(--accent),var(--acc2));
  border-radius:10px;
  display:flex;align-items:center;justify-content:center;
  font-size:17px;
  box-shadow:var(--glow);
}

.logo-text {
  font-family:'Space Mono',monospace;
  font-size:15px;font-weight:700;letter-spacing:.05em;
  background:linear-gradient(90deg,var(--accent),var(--acc2));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}

.status-dot {
  width:8px;height:8px;
  background:var(--green);
  border-radius:50%;
  box-shadow:0 0 8px var(--green);
  animation:pulse 2s infinite;
}

@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.6;transform:scale(.8)}}

.header-sub{font-size:10px;color:var(--muted);font-family:'Space Mono',monospace}

/* Pages */
.page{display:none;padding:14px}
.page.active{display:block}

/* Cards */
.card {
  background:var(--bg2);
  border:1px solid var(--border);
  border-radius:16px;
  padding:14px;
  margin-bottom:10px;
  position:relative;
  overflow:hidden;
}

.card::before {
  content:'';
  position:absolute;
  top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,var(--accent),transparent);
  opacity:.4;
}

.card-title {
  font-size:10px;font-weight:700;letter-spacing:.1em;
  color:var(--muted);text-transform:uppercase;
  margin-bottom:12px;font-family:'Space Mono',monospace;
}

/* Stats */
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}

.stat-box {
  background:var(--bg3);
  border:1px solid var(--border);
  border-radius:12px;
  padding:12px;text-align:center;
}

.stat-val {
  font-family:'Space Mono',monospace;
  font-size:20px;font-weight:700;margin-bottom:3px;
}

.stat-val.green{color:var(--green);text-shadow:0 0 10px rgba(16,217,138,.4)}
.stat-val.red  {color:var(--red);  text-shadow:0 0 10px rgba(255,69,96,.4)}
.stat-val.blue {color:var(--accent);text-shadow:var(--glow)}
.stat-val.yell {color:var(--yellow)}

.stat-lbl{font-size:10px;color:var(--muted)}

/* Win rate bar */
.wr-bar{background:var(--bg3);border-radius:100px;height:6px;margin:6px 0;overflow:hidden}
.wr-fill {
  height:100%;border-radius:100px;
  background:linear-gradient(90deg,var(--accent),var(--green));
  transition:width 1.2s ease;
  box-shadow:0 0 8px rgba(16,217,138,.4);
}

/* Readiness */
.ready-row {
  display:flex;align-items:center;justify-content:space-between;
  padding:8px 0;border-bottom:1px solid var(--border);
}

.ready-row:last-child{border-bottom:none}

/* Countdown */
.countdown{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--muted);font-family:'Space Mono',monospace}
.cd-dot{width:6px;height:6px;background:var(--green);border-radius:50%;animation:pulse 1.5s infinite;box-shadow:0 0 6px var(--green)}

/* Signal cards */
.sig-card {
  background:var(--bg2);
  border:1px solid rgba(16,217,138,.25);
  border-radius:16px;padding:14px;
  margin-bottom:10px;
  position:relative;overflow:hidden;
}

.sig-card::before {
  content:'';position:absolute;
  top:0;left:0;right:0;bottom:0;
  background:linear-gradient(135deg,rgba(16,217,138,.04) 0%,transparent 60%);
  pointer-events:none;
}

.sig-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.sig-coin{font-family:'Space Mono',monospace;font-size:17px;font-weight:700}
.sig-badge {
  padding:4px 10px;border-radius:100px;
  font-size:10px;font-weight:700;font-family:'Space Mono',monospace;letter-spacing:.05em;
  background:rgba(16,217,138,.12);color:var(--green);border:1px solid rgba(16,217,138,.3);
}

.sig-move {
  display:flex;align-items:center;justify-content:space-between;
  padding:8px 12px;background:var(--bg3);border-radius:10px;margin-bottom:8px;
}

.sig-levels{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:8px}

.lvl-box{background:var(--bg3);border-radius:10px;padding:8px;text-align:center}
.lvl-lbl{font-size:9px;color:var(--muted);margin-bottom:3px;font-family:'Space Mono',monospace}
.lvl-val{font-family:'Space Mono',monospace;font-size:12px;font-weight:700}
.lvl-val.e{color:var(--accent)}.lvl-val.s{color:var(--red)}.lvl-val.t{color:var(--green)}

/* Coin chips */
.coin-scroll{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;padding-bottom:4px;margin-bottom:12px}
.coin-scroll::-webkit-scrollbar{display:none}
.chip {
  flex-shrink:0;padding:5px 12px;border-radius:100px;
  border:1px solid var(--border);background:var(--bg3);
  color:var(--muted);font-size:11px;font-weight:600;cursor:pointer;
  transition:all .2s;font-family:'Space Mono',monospace;
}
.chip.active{background:rgba(79,143,255,.15);border-color:var(--accent);color:var(--accent);box-shadow:var(--glow)}

/* Period grid */
.period-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;margin-bottom:12px}
.p-btn {
  padding:7px 4px;border-radius:8px;border:1px solid var(--border);
  background:var(--bg3);color:var(--muted);font-size:10px;font-weight:600;
  cursor:pointer;transition:all .2s;font-family:'Space Mono',monospace;text-align:center;
}
.p-btn.active{background:rgba(79,143,255,.15);border-color:var(--accent);color:var(--accent)}

/* Chart */
.chart-wrap{position:relative;height:160px;margin-bottom:10px}

/* Chart mode toggle */
.chart-mode-row{display:flex;gap:6px;margin-bottom:10px}
.mode-btn {
  flex:1;padding:7px 8px;border-radius:8px;
  border:1px solid var(--border);background:var(--bg3);
  color:var(--muted);font-size:11px;font-weight:600;cursor:pointer;
  transition:all .2s;font-family:'Space Grotesk',sans-serif;
  display:flex;align-items:center;justify-content:center;gap:5px;
}
.mode-btn.active{background:rgba(79,143,255,.15);border-color:var(--accent);color:var(--accent)}

/* OHLC info bar shown in candlestick mode */
.ohlc-bar {
  display:grid;grid-template-columns:repeat(4,1fr);gap:6px;
  margin-bottom:10px;
}
.ohlc-item{background:var(--bg3);border-radius:8px;padding:6px;text-align:center}
.ohlc-lbl{font-size:9px;color:var(--muted);font-family:'Space Mono',monospace;margin-bottom:2px}
.ohlc-val{font-size:11px;font-weight:700;font-family:'Space Mono',monospace}
.ohlc-val.o{color:var(--accent)}
.ohlc-val.h{color:var(--green)}
.ohlc-val.l{color:var(--red)}
.ohlc-val.c{color:var(--yellow)}

/* Forecast */
.fc-box{border-radius:12px;padding:12px;margin-bottom:10px}
.fc-box.up{background:rgba(16,217,138,.07);border:1px solid rgba(16,217,138,.2)}
.fc-box.down{background:rgba(255,69,96,.07);border:1px solid rgba(255,69,96,.2)}
.fc-box.neutral{background:rgba(79,143,255,.07);border:1px solid rgba(79,143,255,.2)}
.fc-dir{font-size:13px;font-weight:700;margin-bottom:8px}
.fc-row{display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px}
.fc-row span:first-child{color:var(--muted)}
.fc-row span:last-child{font-family:'Space Mono',monospace;font-weight:600}

/* Indicators */
.ind-wrap{display:flex;flex-wrap:wrap;gap:5px;margin-top:8px}
.ind{padding:4px 10px;border-radius:100px;font-size:10px;font-family:'Space Mono',monospace;border:1px solid}
.ind.bull{background:rgba(16,217,138,.1);border-color:rgba(16,217,138,.3);color:var(--green)}
.ind.bear{background:rgba(255,69,96,.1);border-color:rgba(255,69,96,.3);color:var(--red)}
.ind.neut{background:rgba(79,143,255,.1);border-color:rgba(79,143,255,.3);color:var(--accent)}

/* Legend */
.leg-section{margin-bottom:14px}
.leg-section-title {
  font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;
  color:var(--accent);font-family:'Space Mono',monospace;
  margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid var(--border);
}
.leg-item {
  padding:10px;background:var(--bg3);
  border-radius:10px;margin-bottom:5px;border:1px solid var(--border);
}
.leg-term{font-size:12px;font-weight:700;margin-bottom:4px;display:flex;align-items:center;gap:6px}
.leg-desc{font-size:11px;color:var(--muted);line-height:1.5}

/* Bottom nav */
.bottom-nav {
  position:fixed;bottom:0;left:0;right:0;
  background:rgba(13,18,32,.97);
  border-top:1px solid var(--border);
  display:flex;padding:8px 0 max(8px,env(safe-area-inset-bottom));
  backdrop-filter:blur(20px);z-index:100;
}
.b-btn {
  flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;
  background:none;border:none;color:var(--muted);
  font-family:'Space Grotesk',sans-serif;font-size:9px;font-weight:500;
  cursor:pointer;padding:4px;transition:all .2s;
}
.b-btn .ico{font-size:19px}
.b-btn.active{color:var(--accent)}

/* Empty */
.empty{text-align:center;padding:48px 20px;color:var(--muted)}
.empty .ico{font-size:44px;margin-bottom:12px}
.empty .ttl{font-size:15px;font-weight:600;margin-bottom:6px;color:var(--text)}
.empty .sub{font-size:12px;line-height:1.5}

/* Animations */
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
.fu{animation:fadeUp .35s ease forwards}

@keyframes spin{to{transform:rotate(360deg)}}
.spinner{width:28px;height:28px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
</style>
</head>
<body>
<div class="app">

<!-- HEADER -->
<div class="header">
  <div class="header-row">
    <div class="logo">
      <div class="logo-icon">🌙</div>
      <span class="logo-text">MOON TRADER</span>
    </div>
    <div class="status-dot"></div>
  </div>
  <div class="header-sub" id="hdr-sub">⟳ Сканування кожні 60 хв · Bybit + BlackBit</div>
</div>

<!-- PAGE: DASHBOARD -->
<div class="page active" id="page-dashboard">
<div class="fu">

  <div class="card">
    <div class="card-title">📊 Статистика місії</div>
    <div class="stats-grid">
      <div class="stat-box"><div class="stat-val blue" id="s-total">—</div><div class="stat-lbl">Сигналів</div></div>
      <div class="stat-box"><div class="stat-val yell" id="s-wr">—</div><div class="stat-lbl">Win Rate</div></div>
      <div class="stat-box"><div class="stat-val green" id="s-wins">—</div><div class="stat-lbl">Прибуток</div></div>
      <div class="stat-box"><div class="stat-val red" id="s-loss">—</div><div class="stat-lbl">Збиток</div></div>
    </div>
    <div style="font-size:10px;color:var(--muted);margin-bottom:5px;font-family:'Space Mono',monospace">WIN RATE</div>
    <div class="wr-bar"><div class="wr-fill" id="wr-fill" style="width:0%"></div></div>
    <div style="display:flex;justify-content:space-between;font-size:9px;color:var(--muted);font-family:'Space Mono',monospace;margin-top:3px">
      <span>0%</span><span>🎯 55%</span><span>100%</span>
    </div>
  </div>

  <div class="card">
    <div class="card-title">🚀 Готовність до торгівлі</div>
    <div id="ready-list"></div>
  </div>

  <div class="card">
    <div class="card-title">⏱ Наступне сканування</div>
    <div class="countdown"><div class="cd-dot"></div><span id="cd-text">Система активна</span></div>
  </div>

</div>
</div>

<!-- PAGE: SIGNALS -->
<div class="page" id="page-signals">
  <div class="fu" id="sig-list">
    <div style="display:flex;flex-direction:column;align-items:center;gap:10px;padding:40px">
      <div class="spinner"></div>
      <span style="font-size:12px;color:var(--muted)">Завантажуємо сигнали...</span>
    </div>
  </div>
</div>

<!-- PAGE: ANALYSIS -->
<div class="page" id="page-analysis">
<div class="fu">
  <div class="coin-scroll" id="coin-sel"></div>
  <div class="period-grid" id="per-sel"></div>
  <div class="card">
    <div class="card-title" id="chart-lbl">📈 Графік</div>
    <div class="chart-mode-row">
      <button class="mode-btn active" id="mode-line" onclick="setChartMode('line')">📈 Лінія</button>
      <button class="mode-btn" id="mode-candle" onclick="setChartMode('candle')">🕯️ Свічки</button>
    </div>
    <div class="ohlc-bar" id="ohlc-bar" style="display:none">
      <div class="ohlc-item"><div class="ohlc-lbl">OPEN</div><div class="ohlc-val o" id="ohlc-o">—</div></div>
      <div class="ohlc-item"><div class="ohlc-lbl">HIGH</div><div class="ohlc-val h" id="ohlc-h">—</div></div>
      <div class="ohlc-item"><div class="ohlc-lbl">LOW</div><div class="ohlc-val l" id="ohlc-l">—</div></div>
      <div class="ohlc-item"><div class="ohlc-lbl">CLOSE</div><div class="ohlc-val c" id="ohlc-c">—</div></div>
    </div>
    <div class="chart-wrap"><canvas id="chart"></canvas></div>
    <div id="res-note" style="display:none;font-size:10px;color:var(--muted);margin-top:6px;text-align:center;font-family:'Space Mono',monospace"></div>
  </div>
  <div id="fc-wrap"></div>
  <div class="card" id="ind-card" style="display:none">
    <div class="card-title">🔭 Індикатори</div>
    <div class="ind-wrap" id="ind-list"></div>
  </div>
</div>
</div>

<!-- PAGE: LEGEND -->
<div class="page" id="page-legend">
  <div class="fu" id="leg-wrap"></div>
</div>

</div><!-- /app -->

<!-- BOTTOM NAV -->
<div class="bottom-nav">
  <button class="b-btn active" onclick="nav('dashboard',this)"><span class="ico">🏠</span>Головна</button>
  <button class="b-btn" onclick="nav('signals',this)"><span class="ico">📡</span>Сигнали</button>
  <button class="b-btn" onclick="nav('analysis',this)"><span class="ico">📊</span>Аналіз</button>
  <button class="b-btn" onclick="nav('legend',this)"><span class="ico">📚</span>Легенда</button>
</div>

<script>
// Telegram init
const tg = window.Telegram?.WebApp;
if(tg){tg.ready();tg.expand();tg.setHeaderColor('#080b14');tg.setBackgroundColor('#080b14');}

// Navigation
function nav(page, btn){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.b-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('page-'+page).classList.add('active');
  if(btn) btn.classList.add('active');
  if(page==='signals')  loadSignals();
  if(page==='analysis') initAnalysis();
  if(page==='legend')   renderLegend();
}

// API — реальні дані з бота
// API_URL передається через Telegram WebApp initData або беремо з параметрів
const API_URL = new URLSearchParams(window.location.search).get('api') || 'https://finless-rhona-unpliant.ngrok-free.dev';
const COINS   = ['LINK','DOT','AVAX','ATOM','UNI','LTC','BCH','ETC','NEAR','FIL','ECR'];
const PERIODS = ['6г','12г','24г','3д','7д','30д','90д'];

// Глобальні дані
let STATS   = {total:0,wins:0,losses:0,pending:0,wr:0,pnl:0};
let SIGNALS = [];

// Заголовок щоб ngrok не показував сторінку-попередження мобільним браузерам
const FETCH_OPTS = { headers: { 'ngrok-skip-browser-warning': 'true' } };

async function fetchStats(){
  try{
    const r = await fetch(`${API_URL}/stats`, FETCH_OPTS);
    if(r.ok){ const d=await r.json(); STATS={total:d.total,wins:d.wins,losses:d.losses,pending:d.pending,wr:d.winrate,pnl:d.avg_pnl}; }
  }catch(e){ console.log('API недоступний, використовуємо локальні дані', e); }
}

async function fetchSignals(){
  try{
    const r = await fetch(`${API_URL}/signals?limit=20`, FETCH_OPTS);
    if(r.ok){ const d=await r.json(); SIGNALS=d.signals||[]; }
  }catch(e){ console.log('Сигнали недоступні', e); }
}

async function fetchReadiness(){
  try{
    const r = await fetch(`${API_URL}/readiness`, FETCH_OPTS);
    if(r.ok) return await r.json();
  }catch(e){}
  return null;
}

// Dashboard
async function loadDashboard(){
  await fetchStats();
  const s=STATS;
  document.getElementById('s-total').textContent=s.total;
  document.getElementById('s-wr').textContent=s.wr.toFixed(1)+'%';
  document.getElementById('s-wins').textContent=s.wins;
  document.getElementById('s-loss').textContent=s.losses;
  setTimeout(()=>document.getElementById('wr-fill').style.width=s.wr+'%',300);

  const checks=[
    {lbl:'50+ сигналів',ok:s.total>=50,val:s.total+'/50'},
    {lbl:'Win Rate 55%+',ok:s.wr>=55,val:s.wr.toFixed(1)+'%'},
    {lbl:'Позитивний PnL',ok:s.pnl>0,val:'+'+s.pnl.toFixed(2)+'%'},
  ];
  const ready=checks.every(c=>c.ok);
  document.getElementById('ready-list').innerHTML=checks.map(c=>`
    <div class="ready-row">
      <div style="display:flex;align-items:center;gap:8px;font-size:12px">
        <span>${c.ok?'✅':'🔄'}</span>
        <span style="color:${c.ok?'var(--text)':'var(--muted)'}">${c.lbl}</span>
      </div>
      <span style="font-family:'Space Mono',monospace;font-size:11px;color:${c.ok?'var(--green)':'var(--muted)'}">${c.val}</span>
    </div>
  `).join('')+`<div style="text-align:center;margin-top:10px;font-size:12px;font-weight:600;color:${ready?'var(--green)':'var(--muted)'}">
    ${ready?'🚀 ГОТОВО ДО СТАРТУ!':'⏳ Продовжуємо навчання...'}
  </div>`;

  let mins=60;
  const cd=document.getElementById('cd-text');
  const tick=()=>{mins=Math.max(0,mins-1);cd.textContent=mins>0?`До сканування: ${mins} хв`:'🔄 Сканування зараз...';if(!mins)mins=60;};
  setInterval(tick,60000);tick();
}

// Signals
async function loadSignals(){
  await fetchSignals();
  const el=document.getElementById('sig-list');
  if(!SIGNALS.length){

// Analysis
let selCoin='AVAX', selPer='24г', chartMode='line', chart=null;

// Мапа періодів на кількість свічок (TIMEFRAME бота = 4h)
const PERIOD_CANDLES = {'6г':2,'12г':3,'24г':6,'3д':18,'7д':42,'30д':180,'90д':540};

function initAnalysis(){
  document.getElementById('coin-sel').innerHTML=COINS.map(c=>`
    <div class="chip ${c===selCoin?'active':''}" onclick="pickCoin('${c}',this)">${c}</div>`).join('');
  document.getElementById('per-sel').innerHTML=PERIODS.map(p=>`
    <button class="p-btn ${p===selPer?'active':''}" onclick="pickPer('${p}',this)">${p}</button>`).join('');
  drawAnalysis();
}

function pickCoin(c,el){selCoin=c;document.querySelectorAll('.chip').forEach(x=>x.classList.remove('active'));el.classList.add('active');drawAnalysis();}
function pickPer(p,el){selPer=p;document.querySelectorAll('.p-btn').forEach(x=>x.classList.remove('active'));el.classList.add('active');drawAnalysis();}

function setChartMode(mode){
  chartMode=mode;
  document.getElementById('mode-line').classList.toggle('active', mode==='line');
  document.getElementById('mode-candle').classList.toggle('active', mode==='candle');
  document.getElementById('ohlc-bar').style.display = mode==='candle' ? 'grid' : 'none';
  drawAnalysis();
}

async function fetchCandles(coin, limit){
  try{
    const r = await fetch(`${API_URL}/candles?symbol=${coin}&limit=${limit}`, FETCH_OPTS);
    if(r.ok){
      const d = await r.json();
      if(d.candles && d.candles.length) return d.candles;
    }
  }catch(e){ console.log('Candles API недоступний, генеруємо тестові дані'); }
  return null;
}

function generateMockCandles(n){
  const candles=[]; let price=20+Math.random()*80;
  const now=Date.now();
  for(let i=0;i<n;i++){
    const open=price;
    const vol=price*0.02;
    const close=open+(Math.random()-0.48)*vol*2;
    const high=Math.max(open,close)+Math.random()*vol*0.5;
    const low =Math.min(open,close)-Math.random()*vol*0.5;
    candles.push({ts: now-(n-i)*14400000, open:+open.toFixed(4), high:+high.toFixed(4), low:+low.toFixed(4), close:+close.toFixed(4), volume:0});
    price=close;
  }
  return candles;
}

async function drawAnalysis(){
  document.getElementById('chart-lbl').textContent=`📈 ${selCoin}/USDT · ${selPer}`;

  const n = PERIOD_CANDLES[selPer] || 6;
  // Показуємо саме стільки свічок скільки відповідає періоду
  // (мінімум 2 щоб було що малювати лінією/свічками)
  const displayN = Math.max(n, 2);

  let candles = await fetchCandles(selCoin, displayN);
  if(!candles || candles.length < 2){
    candles = generateMockCandles(displayN);
  }
  candles = candles.slice(-displayN);

  // Попередження — дані мають крок 4 години, тому короткі періоди
  // фізично не можуть показати більше деталей ніж є в базі
  const resNote = document.getElementById('res-note');
  if(n < 6){
    resNote.style.display = 'block';
    resNote.textContent = `⏱ Дані з кроком 4 години. Період "${selPer}" показує ${n} ${n===1?'останню свічку':'останні свічки'}.`;
  } else {
    resNote.style.display = 'none';
  }

  const closes = candles.map(c=>c.close);
  const chg = ((closes[closes.length-1]-closes[0])/closes[0])*100;
  const up = chg>=0;

  if(chart) chart.destroy();
  const ctx = document.getElementById('chart').getContext('2d');

  if(chartMode==='candle'){
    // ── Свічковий графік ──────────────────────────────────────────────────
    const data = candles.map((c,i)=>({x:i, o:c.open, h:c.high, l:c.low, c:c.close}));

    chart = new Chart(ctx, {
      type: 'candlestick',
      data: { datasets: [{
        label: selCoin,
        data: data,
        color: { up: '#10d98a', down: '#ff4560', unchanged: '#64748b' },
        borderColor: { up: '#10d98a', down: '#ff4560', unchanged: '#64748b' },
      }]},
      options: {
        responsive:true, maintainAspectRatio:false,
        plugins:{
          legend:{display:false},
          tooltip:{
            enabled:true,
            backgroundColor:'#111827',
            borderColor:'#4f8fff',
            borderWidth:1,
            titleColor:'#e2e8f0',
            bodyColor:'#e2e8f0',
            titleFont:{family:'Space Mono',size:10},
            bodyFont:{family:'Space Mono',size:10},
            callbacks:{
              label:(ctx)=>{
                const d=ctx.raw;
                return [`O: $${d.o.toFixed(4)}`,`H: $${d.h.toFixed(4)}`,`L: $${d.l.toFixed(4)}`,`C: $${d.c.toFixed(4)}`];
              }
            }
          }
        },
        scales:{
          x:{display:false, type:'linear'},
          y:{display:true, grid:{color:'rgba(79,143,255,.07)'}, ticks:{color:'#64748b',font:{size:9,family:'Space Mono'},maxTicksLimit:4}, border:{display:false}}
        },
        animation:{duration:400},
        onHover:(evt,elements)=>{
          if(elements && elements.length){
            const idx=elements[0].index;
            const c=candles[idx];
            document.getElementById('ohlc-o').textContent='$'+c.open.toFixed(4);
            document.getElementById('ohlc-h').textContent='$'+c.high.toFixed(4);
            document.getElementById('ohlc-l').textContent='$'+c.low.toFixed(4);
            document.getElementById('ohlc-c').textContent='$'+c.close.toFixed(4);
          }
        }
      }
    });

    // Показуємо останню свічку в OHLC панелі за замовчуванням
    const last = candles[candles.length-1];
    document.getElementById('ohlc-o').textContent='$'+last.open.toFixed(4);
    document.getElementById('ohlc-h').textContent='$'+last.high.toFixed(4);
    document.getElementById('ohlc-l').textContent='$'+last.low.toFixed(4);
    document.getElementById('ohlc-c').textContent='$'+last.close.toFixed(4);

  } else {
    // ── Лінійний графік ───────────────────────────────────────────────────
    const gr=ctx.createLinearGradient(0,0,0,160);
    gr.addColorStop(0, up?'rgba(16,217,138,.25)':'rgba(255,69,96,.25)');
    gr.addColorStop(1,'rgba(8,11,20,0)');
    chart=new Chart(ctx,{
      type:'line',
      data:{labels:closes.map(()=>''),datasets:[{data:closes,borderColor:up?'#10d98a':'#ff4560',backgroundColor:gr,borderWidth:2,fill:true,tension:.4,pointRadius:0}]},
      options:{responsive:true,maintainAspectRatio:false,
        plugins:{legend:{display:false},tooltip:{enabled:false}},
        scales:{x:{display:false},y:{display:true,grid:{color:'rgba(79,143,255,.07)'},ticks:{color:'#64748b',font:{size:9,family:'Space Mono'},maxTicksLimit:4},border:{display:false}}},
        animation:{duration:500}
      }
    });
  }

  // ── Прогноз — РЕАЛЬНІ дані від навченої моделі ──────────────────────────
  const pred = await fetchPrediction(selCoin);

  let fc, fcl, fclr, fmv, bd, rsiVal, macdUp, trendUp, volRatio, bbPos;

  if(pred && pred.status === 'ok'){
    // Реальний прогноз від моделі
    const move = pred.predicted_move;
    bd = pred.band.toFixed(1);
    rsiVal   = pred.rsi;
    macdUp   = pred.macd_hist > 0;
    trendUp  = pred.trend_up;
    volRatio = pred.vol_ratio;
    bbPos    = pred.bb_pos;

    if(move >= 1.0){ fc='up'; fcl='🟢 Очікується РІСТ'; fclr='var(--green)'; fmv='+'+move.toFixed(1)+'%'; }
    else if(move <= -1.0){ fc='down'; fcl='🔴 Очікується ПАДІННЯ'; fclr='var(--red)'; fmv=move.toFixed(1)+'%'; }
    else { fc='neutral'; fcl='⚪ Ринок невизначений'; fclr='var(--accent)'; fmv='±'+Math.abs(move).toFixed(1)+'%'; }
  } else {
    // Модель ще не навчена або дані недоступні — показуємо чесне повідомлення
    fc='neutral'; fcl='⏳ Модель ще навчається'; fclr='var(--muted)'; fmv='—'; bd='—';
    rsiVal=50; macdUp=null; trendUp=null; volRatio=1; bbPos=0.5;
  }

  const predSourceNote = (pred && pred.status === 'ok')
    ? '<span style="color:var(--green)">✅ реальний прогноз моделі</span>'
    : '<span style="color:var(--yellow)">⏳ '+(pred ? pred.message : 'API недоступний')+'</span>';

  document.getElementById('fc-wrap').innerHTML=`
    <div class="fc-box ${fc}">
      <div class="fc-dir" style="color:${fclr}">${fcl}</div>
      <div class="fc-row"><span>Прогноз руху</span><span style="color:${fclr}">${fmv}</span></div>
      <div class="fc-row"><span>Діапазон впевненості</span><span>${bd==='—'?'—':'±'+bd+'% '+(parseFloat(bd)<1.5?'✅':'⚠️')}</span></div>
      <div class="fc-row"><span>Зміна за період</span><span style="color:${up?'var(--green)':'var(--red)'}">${up?'+':''}${chg.toFixed(2)}%</span></div>
      <div style="margin-top:8px;padding-top:8px;border-top:1px solid var(--border);font-size:10px">${predSourceNote}</div>
    </div>`;

  const inds = (pred && pred.status === 'ok') ? [
    {lbl:`RSI ${rsiVal.toFixed(0)}`, t: rsiVal<35?'bull':rsiVal>65?'bear':'neut'},
    {lbl:`MACD ${macdUp?'↑':'↓'}`, t: macdUp?'bull':'bear'},
    {lbl:`EMA ${trendUp?'бичачий':'ведмежий'}`, t: trendUp?'bull':'bear'},
    {lbl:`BB ${bbPos>0.7?'верх':bbPos<0.3?'низ':'центр'}`, t: bbPos>0.7?'bear':bbPos<0.3?'bull':'neut'},
    {lbl:`Vol ${volRatio>=2?'🔥 сплеск':'норм'}`, t: volRatio>=2?'bull':'neut'},
  ] : [{lbl:'Дані з\'являться після навчання моделі', t:'neut'}];

  document.getElementById('ind-card').style.display='block';
  document.getElementById('ind-list').innerHTML=inds.map(i=>`<span class="ind ${i.t}">${i.lbl}</span>`).join('');
}

async function fetchPrediction(coin){
  try{
    const r = await fetch(`${API_URL}/predict?symbol=${coin}`, FETCH_OPTS);
    if(r.ok) return await r.json();
    return { status:'error', message:`HTTP ${r.status}` };
  }catch(e){
    console.log('Predict API недоступний', e);
    return { status:'error', message: e.message || 'Помилка з\'єднання' };
  }
}
